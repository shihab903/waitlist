<!DOCTYPE html>
<html lang="bn">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Join Our Waitlist</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="style.css" />
</head>
<body class="bg-gradient-to-br from-zinc-900 to-black text-white min-h-screen flex items-center justify-center">

  <div class="max-w-md w-full mx-auto px-6 py-12">
    <!-- Header -->
    <div class="text-center mb-10">
      <h1 class="text-5xl font-bold mb-3">🚀 Coming Soon</h1>
      <p class="text-zinc-400 text-lg">jkin our waitlist for upcoming new products</p>
    </div>

    <!-- Form -->
    <form id="waitlist-form" class="space-y-6 bg-zinc-900/70 backdrop-blur-xl p-8 rounded-3xl border border-zinc-700">
      
      <div>
        <label class="block text-sm text-zinc-400 mb-2">তোমার নাম</label>
        <input 
          type="text" 
          id="name" 
          required
          class="w-full bg-zinc-800 border border-zinc-700 rounded-2xl px-5 py-4 focus:outline-none focus:border-blue-500 transition"
          placeholder="entire your full name"
        />
      </div>

      <div>
        <label class="block text-sm text-zinc-400 mb-2">entire your mail</label>
        <input 
          type="email" 
          id="email" 
          required
          class="w-full bg-zinc-800 border border-zinc-700 rounded-2xl px-5 py-4 focus:outline-none focus:border-blue-500 transition"
          placeholder="you@example.com"
        />
      </div>

      <button 
        type="submit"
        id="submit-btn"
        class="w-full bg-gradient-to-r from-blue-600 to-purple-600 hover:from-blue-700 hover:to-purple-700 py-5 rounded-2xl font-semibold text-lg transition-all active:scale-95"
      >
        Waitlist- wait a sec
      </button>
    </form>

    <!-- Success Message -->
    <div id="success-message" class="hidden text-center mt-8">
      <div class="text-6xl mb-4">🎉</div>
      <h2 class="text-2xl font-bold mb-2">successfully join!</h2>
      <p class="text-zinc-400">notify you when our products launch❤️</p>
    </div>

    <p class="text-center text-zinc-500 text-sm mt-10">
      Early access first
    </p>
  </div>

  <script src="script.js"></script>
</body>
</html>
